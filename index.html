<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>anthony</title>

  <link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  
  <link rel="preload" as="style" href="https://fonts.cdnfonts.com/css/vcr-os-mono">
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@fontsource/monaspace-neon/index.css">

 
  <link href="https://fonts.cdnfonts.com/css/vcr-os-mono" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/monaspace-neon/index.css">

  
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="./background.mp4" type="video/mp4">
  </video>

  <!-- overlay -->
  <div id="overlay">
    <div id="status"></div>
  </div>

  <!-- main -->
  <div class="entered">
    <div class="box">

      <!-- FIXED: removed broken space in filename -->
      <img src="./pfp.png" class="pfp" alt="pfp"/>

      <h3>anth</h3>
      <p>don't act surprised</p>

      <a href="https://discord.com/users/371126727428276224" target="_blank">
        <img src="./discord.png" height="30">
      </a>

      <a href="https://t.me/dontextortme" target="_blank">
        <img src="./telegram.png" height="30">
      </a>

      <a href="https://tiktok.com/@phlne" target="_blank">
        <img src="./tiktok.png" height="30">
      </a>

    </div>
  </div>

  <audio id="music" loop>
    <source src="./maybe.mp3" type="audio/mpeg">
  </audio>

  <div class="cursor" id="cursor"></div>

<script>
const overlay = document.getElementById('overlay');
const entered = document.querySelector('.entered');
const music = document.getElementById('music');
const cursor = document.getElementById('cursor');
const status = document.getElementById('status');

let started = false;

function typeWriter(text, i = 0) {
  if (i === 0) status.textContent = "";
  if (i < text.length) {
    status.textContent += text.charAt(i);
    setTimeout(() => typeWriter(text, i + 1), 20);
  }
}

setTimeout(() => {
  typeWriter('press any key to enter');
}, 600);

function enterSite() {
  if (started) return;
  started = true;

  music.volume = 0;
  music.play().catch(()=>{});

  let v = 0;
  const fade = setInterval(()=>{
    if (v >= 0.5) return clearInterval(fade);
    v += 0.05;
    music.volume = v;
  }, 50);

  entered.style.display = 'block';
  overlay.classList.add('fade');
  setTimeout(()=> overlay.style.display = 'none', 800);
}

document.addEventListener('keydown', enterSite, { once:true });
document.addEventListener('click', enterSite, { once:true });

document.addEventListener('mousemove', (e)=>{
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
</script>

</body>
</html>
